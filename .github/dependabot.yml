version: 2
updates:
  - package-ecosystem: npm
    directory: /web
    schedule: { interval: weekly }
    open-pull-requests-limit: 10
    labels: [dependencies, web]
  - package-ecosystem: npm
    directory: /mobile
    schedule: { interval: weekly }
    open-pull-requests-limit: 10
    labels: [dependencies, mobile]
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
